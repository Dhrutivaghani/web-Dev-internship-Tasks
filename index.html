<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Navbar -->
        <nav>
            <div class="logo">◉</div>

            <ul class="nav-links">
                <li><a href="#">Products</a></li>
                <li><a href="#">App</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">FAQ</a></li>
            </ul>

            <div class="buttons">
                <button class="login">LOG IN</button>
                <button class="signup">SIGN UP</button>
            </div>
        </nav>

        <!-- Grid Layout -->
        <div class="grid">

            <!-- Large Left Card -->
            <div class="card hero">
                <small>MORE OFFERS</small>

                <h1>
                    There is<br>
                    something else<br>
                    for you
                </h1>

                <button class="shop-btn">All Products 🛒</button>
            </div>

            <!-- Top Right Card -->
            <div class="card blog">
                <small>WORLD OF HEARING TECHNOLOGY</small>
                <h2>View our blog</h2>
            </div>

            <!-- Bottom Left -->
            <div class="card about">
                <small>DISCOVER OUR STORY</small>
                <h2>About us</h2>
            </div>

            <!-- Bottom Right -->
            <div class="card contact">
                <small>HAVE SOME QUESTIONS?</small>
                <h2>Contact us</h2>
            </div>

        </div>

    </div>

</body>

</html>
